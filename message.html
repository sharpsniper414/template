<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Dil Ki Baat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="fc"></canvas>
<div id="cursor-outer"></div><div id="cursor-inner"></div><div id="cursor-emoji">🌸</div>

<nav id="nav">
  <a href="index.html">🏠 Home</a>
  <a href="story.html">🌸 Story</a>
  <a href="gallery.html">🖼️ Gallery</a>
  <a href="together.html">🫶 Hamare Pal</a>
  <a href="message.html">💌 Letter</a>
  <a href="quiz.html">💭 Quiz</a>
  <a href="yaadein.html">🫙 Yaadein</a>
  <a href="waqt.html">⏳ Waqt</a>
  <a href="duaayein.html">🌟 Duaayein</a>
  <a href="surprise.html">💍 Surprise</a>
</nav>
<button id="music-btn" onclick="toggleMusic()">🎵</button>
<button id="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<audio id="bg-music" loop><source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg"></audio>
<div id="lightbox">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <button id="lb-prev" onclick="lbNav(-1)">‹</button>
  <img id="lb-img" src="" alt="">
  <button id="lb-next" onclick="lbNav(1)">›</button>
  <div id="lb-cap"></div>
</div>

<section id="message">
  <div class="inner">
    <h2 class="s-head reveal">💌 Dil Ki Baat</h2>
    <p class="s-sub reveal">Yeh woh cheezein hain jo aksar kehne ki himmat nahi hoti.</p>
    <div class="letter-box reveal">
      <span class="letter-icon">💌</span>
      <div class="letter-sal" id="letter-sal"></div>
      <div class="letter-body" id="letter-body"></div>
      <div class="letter-line"></div>
      <div class="letter-sign" id="letter-sign"></div>
      <div class="letter-line"></div>
      <p class="letter-ps" id="letter-ps"></p>
    </div>
  </div>
</section>

<footer>
  <span class="footer-alien">👾</span>
  Made with <span>💖</span> and real feelings &nbsp;·&nbsp; Sirf tumhare liye &nbsp;·&nbsp; Hamesha
  <div class="footer-hearts">💕 🌸 ✨ 🌸 💕</div>
  <div style="margin-top:10px;font-size:.78rem;color:var(--light);opacity:.7;">
    Created by <strong style="color:var(--pink);">Cheenu Sagar</strong> 👾
  </div>
</footer>
<script src="config.js"></script>
<script src="shared.js"></script>
<script>
document.querySelectorAll('nav a').forEach(a=>{ if(a.getAttribute('href')==='message.html') a.classList.add('active'); });

document.getElementById('letter-sal').textContent = CONFIG.letterSalutation.replace('[Naam]', CONFIG.herName);
const body = document.getElementById('letter-body');
CONFIG.letterBody.forEach(para => {
  const p = document.createElement('p');
  p.textContent = para;
  body.appendChild(p);
});
document.getElementById('letter-sign').innerHTML = CONFIG.yourName + ',<br>' + CONFIG.letterSign;
document.getElementById('letter-ps').textContent = 'P.S. — ' + CONFIG.letterPS;

</script>
</body>
</html>
