<script src="config.js"></script>

<script>
document.querySelectorAll('nav a').forEach(a=>{ if(a.getAttribute('href')==='duaayein.html') a.classList.add('active'); });

const wishGrid = document.getElementById('wish-grid');
const wishBgs = ['rgba(255,240,248,.9)','rgba(245,238,255,.9)','rgba(255,250,240,.9)','rgba(255,240,255,.9)','rgba(240,248,255,.9)','rgba(255,244,240,.9)','rgba(248,255,240,.9)','rgba(245,240,255,.9)'];
const wishShs = ['rgba(255,179,198,.45)','rgba(212,170,255,.45)','rgba(255,230,180,.45)','rgba(255,179,228,.45)','rgba(170,200,255,.45)','rgba(255,200,180,.45)','rgba(180,255,200,.45)','rgba(200,180,255,.45)'];
const wishWrs = ['-2deg','2.5deg','-1.5deg','3deg','-2.5deg','1.5deg','-3deg','2deg'];
CONFIG.wishes.forEach((w, i) => {
  const div = document.createElement('div');
  div.className = 'wish-note';
  div.style.cssText = `background:${wishBgs[i%wishBgs.length]};box-shadow:4px 4px 0 ${wishShs[i%wishShs.length]};transform:rotate(${wishWrs[i%wishWrs.length]});`;
  div.innerHTML = `<span class="wish-note-emoji">${w.emoji}</span><span>${w.text}</span>`;
  wishGrid.appendChild(div);
});

</script>
