  <a href="index.html">🏠 Home</a>

<button id="music-btn" onclick="toggleMusic()">🎵</button>
<button id="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<audio id="bg-music" loop><source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg"></audio>
<div id="lightbox">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <button id="lb-prev" onclick="lbNav(-1)">‹</button>
  <img id="lb-img" src="" alt="">
  <button id="lb-next" onclick="lbNav(1)">›</button>
  <div id="lb-cap"></div>
</div>

<section id="story">
  <div class="inner">
    <h2 class="s-head reveal">🌸 Hamari Kahani</h2>
    <p class="s-sub reveal">Chhoti chhoti yaadein, badi badi baatein — sab yahan hain.</p>
    <div class="story-frame reveal">
      <div class="timeline" id="timeline-container"></div>
    </div>
  </div>
</section>

<footer>
  <span class="footer-alien">👾</span>
  Made with <span>💖</span> and real feelings &nbsp;·&nbsp; Sirf tumhare liye &nbsp;·&nbsp; Hamesha
  <div class="footer-hearts">💕 🌸 ✨ 🌸 💕</div>
  <div style="margin-top:10px;font-size:.78rem;color:var(--light);opacity:.7;">
    Created by <strong style="color:var(--pink);">Cheenu Sagar</strong> 👾
  </div>
</footer>
<script src="config.js"></script>
<script src="shared.js"></script>
<script>
document.querySelectorAll('nav a').forEach(a=>{ if(a.getAttribute('href')==='story.html') a.classList.add('active'); });

// Build timeline from config
const container = document.getElementById('timeline-container');
CONFIG.timeline.forEach((ch, i) => {
  const item = document.createElement('div');
  item.className = 't-item';
  item.innerHTML = `<div class="t-date">${ch.label.replace('\n','<br>')}</div><div class="t-content"><h3>${ch.heading}</h3><p>${ch.text}</p></div>`;
  container.appendChild(item);
  if(i < CONFIG.timeline.length - 1){
    const div = document.createElement('div');
    div.className = 't-div';
    container.appendChild(div);
  }
});
// re-observe new t-items
const tObs2=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:.1});
document.querySelectorAll('.t-item').forEach((el,i)=>{el.style.transitionDelay=(i*.13)+'s';tObs2.observe(el);});

</script>
</body>
</html>
